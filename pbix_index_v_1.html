<html lang="es">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PBIx · Mapa de calor</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  :root{
    --texto:"Helvetica Neue",Helvetica,Arial,sans-serif;
    --display:"Anton","Helvetica Neue",Impact,sans-serif;
    --tinta:#1A1F35; --tinta-2:#5F6885; --linea:#C7CEE2; --panel:#F7F8FC;
    --base:#DDE2F0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:var(--texto);background:var(--base);}
  #map{position:absolute;inset:0;background:var(--base);}
  .leaflet-container{font-family:var(--texto);background:var(--base)}
  /* tiñe el mapa base hacia el azul grisáceo claro */
  .leaflet-tile-pane{mix-blend-mode:multiply;opacity:.92;filter:saturate(.35) contrast(.95)}
  .leaflet-control-zoom a{background:var(--panel)!important;color:var(--tinta)!important;border-color:var(--linea)!important}
  .leaflet-control-attribution{background:rgba(247,248,252,.88)!important;color:var(--tinta-2)!important}
  .leaflet-control-attribution a{color:var(--tinta-2)!important}
  .box{position:absolute;z-index:500;background:rgba(247,248,252,.95);border:1px solid var(--linea);
    box-shadow:0 2px 16px rgba(26,31,53,.18);backdrop-filter:blur(6px);color:var(--tinta)}
  .legend{bottom:20px;left:14px;padding:12px 14px;min-width:214px;}
  .legend .t{font-family:var(--display);font-size:16px;letter-spacing:.02em;text-transform:uppercase;margin-bottom:8px}
  .legend .bar{height:12px;border-radius:2px;margin-bottom:5px;
    background:linear-gradient(90deg,#00783c,#2ec85a,#b4e11e,#ffd400,#ff8c00,#e61414)}
  .legend .ends{display:flex;justify-content:space-between;font-weight:700;font-size:11px}
  .legend .ends.s{font-weight:400;color:var(--tinta-2);margin-top:2px}
  .legend .sub{font-size:10.5px;color:var(--tinta-2);margin-top:7px;line-height:1.4}
  .side{top:14px;right:14px;bottom:20px;width:250px;padding:0;display:flex;flex-direction:column}
  .side .hd{padding:14px 16px 12px;border-bottom:1px solid var(--linea)}
  .side .hd .t{font-family:var(--display);font-size:19px;text-transform:uppercase;letter-spacing:.02em}
  .side .hd .s{font-size:10.5px;color:var(--tinta-2);margin-top:3px;letter-spacing:.04em;text-transform:uppercase;font-weight:700}
  .side .list{overflow:auto;padding:6px 0}
  .rowd{display:flex;align-items:center;gap:10px;padding:8px 16px}
  .rowd .dot{width:10px;height:10px;border-radius:2px;flex:none}
  .rowd .d{flex:1;font-size:12.5px;font-weight:700;line-height:1.15}
  .rowd .d small{display:block;font-weight:400;color:var(--tinta-2);font-size:10px;margin-top:1px}
  .rowd .v{font-family:var(--display);font-size:19px;letter-spacing:.02em;font-variant-numeric:tabular-nums}
  @media(max-width:760px){.side{position:static;width:auto;margin:10px}}
</style>
</head>
<body>
<div id="map"></div>

<div class="box legend">
  <div class="t">Pollo a la brasa</div>
  <div class="bar"></div>
  <div class="ends"><span id="lmin">—</span><span id="lmax">—</span></div>
  <div class="ends s"><span>más barato</span><span>más caro</span></div>
  <div class="sub">Precio del pollo entero, para llevar. Superficie interpolada; no marca locales.</div>
</div>

<div class="box side">
  <div class="hd">
    <div class="t">Precio promedio</div>
    <div class="s">por distrito · S/ pollo entero</div>
  </div>
  <div class="list" id="lista"></div>
</div>

const soles=n=>'S/ '+n.toFixed(2).replace('.',',');
const mean=a=>a.reduce((x,y)=>x+y,0)/a.length;

const map=L.map('map',{zoomControl:true,scrollWheelZoom:true,zoomAnimation:false,markerZoomAnimation:false})
  .setView([-16.405,-71.535],12.3);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {attribution:'© OpenStreetMap © CARTO',maxZoom:19,subdomains:'abcd'}).addTo(map);

const pts_all = DATA.filter(d=>d.p!=null);

function ramp(t){
  t=Math.max(0,Math.min(1,t));
  const s=[[0,[0,120,60]],[0.30,[46,200,90]],[0.50,[180,225,30]],
           [0.66,[255,212,0]],[0.82,[255,140,0]],[1,[230,20,20]]];
  for(let i=0;i<s.length-1;i++) if(t>=s[i][0]&&t<=s[i+1][0]){
    const f=(t-s[i][0])/(s[i+1][0]-s[i][0]);
    return s[i][1].map((c,j)=>Math.round(c+(s[i+1][1][j]-c)*f));
  }
  return s[s.length-1][1];
}

const Heat=L.Layer.extend({
  onAdd(m){ this._m=m; this._c=L.DomUtil.create('canvas'); this._c.style.position='absolute';
    m.getPanes().overlayPane.appendChild(this._c);
    this._h=()=>{ cancelAnimationFrame(this._r); this._r=requestAnimationFrame(()=>this._draw()); };
    m.on('moveend zoomend resize',this._h,this); this._draw(); },
  onRemove(m){ m.getPanes().overlayPane.removeChild(this._c); m.off('moveend zoomend resize',this._h,this); },
  _draw(){
    const m=this._m,size=m.getSize(),tl=m.containerPointToLayerPoint([0,0]);
    L.DomUtil.setPosition(this._c,tl); this._c.width=size.x; this._c.height=size.y;
    const ctx=this._c.getContext('2d'); ctx.clearRect(0,0,size.x,size.y);
    const pts=pts_all.map(d=>{const p=m.latLngToContainerPoint([d.lat,d.lon]);return{x:p.x,y:p.y,p:d.p};});
    if(pts.length<3) return;
    const ps=pts.map(p=>p.p),mn=Math.min(...ps),mx=Math.max(...ps);
    const zk=Math.pow(2,m.getZoom()-12.3);
    const D0=70*zk, R=150*zk, step=4;
    const img=ctx.createImageData(size.x,size.y),buf=img.data;
    for(let y=0;y<size.y;y+=step)for(let x=0;x<size.x;x+=step){
      let num=0,den=0,near=Infinity;
      for(const p of pts){
        const dx=x-p.x,dy=y-p.y,d2=dx*dx+dy*dy;
        if(d2<near)near=d2;
        const w=1/Math.pow(d2+45,1.2); num+=w*p.p; den+=w;
      }
      const nd=Math.sqrt(near);
      if(nd>R)continue;
      let t=mx>mn?(num/den-mn)/(mx-mn):0.5; t=Math.max(0,Math.min(1,t*1.12-0.06));
      const c=ramp(t);
      const a=Math.round(230*(nd<=D0?1:1-(nd-D0)/(R-D0)));
      for(let yy=y;yy<y+step&&yy<size.y;yy++)for(let xx=x;xx<x+step&&xx<size.x;xx++){
        const i=(yy*size.x+xx)*4; buf[i]=c[0];buf[i+1]=c[1];buf[i+2]=c[2];buf[i+3]=a;
      }
    }
    ctx.putImageData(img,0,0);
    ctx.globalAlpha=.85; ctx.filter='blur(11px)'; ctx.drawImage(this._c,0,0); ctx.filter='none'; ctx.globalAlpha=1;
    this._c.style.opacity='0.72';
  }
});
new Heat().addTo(map);

(function(){
  const g={};
  pts_all.forEach(d=>{ (g[d.d]||(g[d.d]=[])).push(d.p); });
  const ms=Object.values(g).map(mean), mn=Math.min(...ms), mx=Math.max(...ms);
  const rows=Object.entries(g).map(([d,a])=>[d,mean(a),a.length]).sort((a,b)=>b[1]-a[1]);
  document.getElementById('lista').innerHTML=rows.map(([d,m,n])=>{
    const t=mx>mn?(m-mn)/(mx-mn):.5,c=ramp(t);
    return '<div class="rowd"><span class="dot" style="background:rgb('+c[0]+','+c[1]+','+c[2]+')"></span>'+
      '<span class="d">'+d+'<small>'+n+' '+(n===1?'local':'locales')+'</small></span>'+
      '<span class="v" style="color:rgb('+c[0]+','+c[1]+','+c[2]+')">'+soles(m)+'</span></div>';
  }).join('');
  document.getElementById('lmin').textContent=soles(Math.min(...pts_all.map(d=>d.p)));
  document.getElementById('lmax').textContent=soles(Math.max(...pts_all.map(d=>d.p)));
})();
